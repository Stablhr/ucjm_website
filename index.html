<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>UCJM Church</title>
  </head>
  <body class="bg-ivory text-charcoal font-body antialiased">
    <div id="root"></div>
    <script>
      var v = '1.0.2'
      try {
        var c = localStorage.getItem('ucjm-version')
        if (c && c !== v) {
          localStorage.clear()
          location.reload(true)
        }
        localStorage.setItem('ucjm-version', v)
      } catch(e) {}
      fetch('/version.json?t=' + Date.now())
        .then(function(r) { return r.json() })
        .then(function(d) {
          if (d.version && d.version !== v) {
            localStorage.clear()
            location.reload(true)
          }
        })
        .catch(function() {})
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
